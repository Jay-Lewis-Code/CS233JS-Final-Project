<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Event - Board Game Meetups</title>
</head>
<body>

    <!-- Navigation Injected Directly From navbar() in navbar.js -->
    <div id="navbar"></div>

    <div class="container mt-5">
        <div class="row">
            <div class="col-8 mx-auto">
                <div class="card shadow">
                    <div class="card-body">
                        <h1 class="mb-5">Create Event</h1>
                        
                        <form id="createEventForm">
                            <!-- Title -->
                            <div class="mb-3">
                                <label for="eventTitle" class="form-label">Title</label>
                                <input type="text" class="form-control" id="eventTitle" required>
                            </div>

                            <!-- Large Image URL -->
                            <div class="mb-3">
                                <label for="largeImageUrl" class="form-label">Large Image URL</label>
                                <input type="url" class="form-control" id="largeImageUrl" required>
                            </div>

                            <!-- Small Image URL -->
                            <div class="mb-3">
                                <label for="smallImageUrl" class="form-label">Small Image URL (list thumbnail)</label>
                                <input type="url" class="form-control" id="smallImageUrl" required>
                            </div>

                            <!-- Modal Image URL -->
                            <div class="mb-3">
                                <label for="modalImageUrl" class="form-label">Modal Image URL (map screenshot)</label>
                                <input type="url" class="form-control" id="modalImageUrl" required>
                            </div>

                            <!-- Location -->
                            <div class="mb-3">
                                <label for="eventLocation" class="form-label">Location</label>
                                <input type="text" class="form-control" id="eventLocation" required>
                            </div>

                            <!-- Date and Start Time Row -->
                            <div class="row mb-3">
                                <div class="col-md-6">
                                    <label for="eventDate" class="form-label">Date</label>
                                    <input type="date" class="form-control" id="eventDate" placeholder="mm/dd/yyyy" required>
                                </div>
                                <div class="col-md-6">
                                    <label for="eventTime" class="form-label">Start Time</label>
                                    <input type="time" class="form-control" id="eventTime" required>
                                </div>
                            </div>

                            <!-- Description -->
                            <div class="mb-3">
                                <label for="eventDescription" class="form-label">Description</label>
                                <textarea class="form-control" id="eventDescription" rows="4" required></textarea>
                            </div>

                            <!-- Submit Button -->
                            <button type="submit" class="btn btn-primary">Create event</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
