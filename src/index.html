<!DOCTYPE html>
  <html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Board Game Cats!</title>
  </head>
  <body>

    <!-- Navigation Injected Directly From navbar() in navbar.js -->
    <div id="navbar"></div>

    <div class="container mt-5">
      <div class="row">
        <h1 class="text-center mb-5">Board Game Meetups</h1>
      </div>

      <div class="row">
        <div class="list-group col-8 mx-auto">

          <!-- Event Item #1 -->
          <button type="button" class="list-group-item list-group-item-action p-3 border mb-3" data-bs-toggle="modal" data-bs-target="#eventModal">
            <div class="d-flex gap-3">
              <img src="./assets/images/thumb-images/meetup-image-01.jpg" alt="event" class="rounded" style="width: 120px; height: 120px; object-fit: cover;">
              <div class="flex-grow-1">
                <h5 class="mb-1">Event Title</h5>
                <p class="text-secondary mb-2">Brief description of the event</p>
                <p class="small text-muted mb-0"><strong>8:34 AM</strong> • Dec 23, 2025</p>
                <p class="small text-muted">Location Address</p>
              </div>
            </div>
          </button>

          <!-- Event Item #2 -->
          <button type="button" class="list-group-item list-group-item-action p-3 border mb-3" data-bs-toggle="modal" data-bs-target="#eventModal">
            <div class="d-flex gap-3">
              <img src="./assets/images/thumb-images/meetup-image-02.jpg" alt="event" class="rounded" style="width: 120px; height: 120px; object-fit: cover;">
              <div class="flex-grow-1">
                <h5 class="mb-1">Event Title</h5>
                <p class="text-secondary mb-2">Brief description of the event</p>
                <p class="small text-muted mb-0"><strong>8:34 AM</strong> • Dec 23, 2025</p>
                <p class="small text-muted">Location Address</p>
              </div>
            </div>
          </button>

          <!-- Event Item #3 -->
          <button type="button" class="list-group-item list-group-item-action p-3 border mb-3" data-bs-toggle="modal" data-bs-target="#eventModal">
            <div class="d-flex gap-3">
              <img src="./assets/images/thumb-images/meetup-image-03.jpg" alt="event" class="rounded" style="width: 120px; height: 120px; object-fit: cover;">
              <div class="flex-grow-1">
                <h5 class="mb-1">Event Title</h5>
                <p class="text-secondary mb-2">Brief description of the event</p>
                <p class="small text-muted mb-0"><strong>8:34 AM</strong> • Dec 23, 2025</p>
                <p class="small text-muted">Location Address</p>
              </div>
            </div>
          </button>

          <!-- Event Item #4 -->
          <button type="button" class="list-group-item list-group-item-action p-3 border mb-3" data-bs-toggle="modal" data-bs-target="#eventModal">
            <div class="d-flex gap-3">
              <img src="./assets/images/thumb-images/meetup-image-04.jpg" alt="event" class="rounded" style="width: 120px; height: 120px; object-fit: cover;">
              <div class="flex-grow-1">
                <h5 class="mb-1">Event Title</h5>
                <p class="text-secondary mb-2">Brief description of the event</p>
                <p class="small text-muted mb-0"><strong>8:34 AM</strong> • Dec 23, 2025</p>
                <p class="small text-muted">Location Address</p>
              </div>
            </div>
          </button>

        </div>
      </div>
    </div>

    <!-- Modal -->
    <div class="modal fade" id="eventModal" tabindex="-1">
      <div class="modal-dialog" id="eventModal">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="modalTitle">Event Title</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
          </div>
          <div class="modal-body">
            <p class="text-secondary" id="modalDescription">Event description</p>
            <p class="small text-muted mb-2">
              <strong id="modalTime">8:34 AM</strong> • <span id="modalDate">Dec 23, 2025</span>
            </p>
            <p class="small text-muted mb-3" id="modalLocation">Location</p>
            <img src="./assets/images/google-maps-placeholder.png" alt="map" class="img-fluid rounded" id="modalMap" style="width: 100%; height: 250px; object-fit: cover;">
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
            <button type="button" class="btn btn-success">More Information</button>
          </div>
        </div>
      </div>
    </div>

  </body>
</html>
